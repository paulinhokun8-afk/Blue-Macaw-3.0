<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destaques</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <a href="index.html" class="voltar">Voltar</a>

    <nav>
        <h1>Blue Macaw</h1>
    </nav>

    <section class="produtos">

        <div class="card">
            <img src="img/CamisaWhiteBlue.png" alt="Camiseta White Blue">
            <h3>Camiseta White Blue</h3>
            <p>R$ 89,90</p>
            <button onclick="adicionarCarrinho('Camiseta White Blue', 89.90, 'img/CamisaWhiteBlue.png')">
                Adicionar ao carrinho
            </button>
        </div>

        <div class="card">
            <img src="img/CamisaBlue.png" alt="Camiseta Azul">
            <h3>Camiseta Azul</h3>
            <p>R$ 99,90</p>
            <button onclick="adicionarCarrinho('Camiseta Azul', 99.90, 'img/CamisaBlue.png')">
                Adicionar ao carrinho
            </button>
        </div>

        <div class="card">
            <img src="img/CalcaJeansPremium.png" alt="Calça Jeans Premium">
            <h3>Calça Jeans Premium</h3>
            <p>R$ 149,90</p>
            <button onclick="adicionarCarrinho('Calça Jeans Premium', 149.90, 'img/CalcaJeansPremium.png')">
                Adicionar ao carrinho
            </button>
        </div>

        <div class="card">
            <img src="img/CamisaModeloBlack.png" alt="Camiseta Branca Modelo Black">
            <h3>Camiseta Branca Modelo Black</h3>
            <p>R$ 109,90</p>
            <button onclick="adicionarCarrinho('Camiseta Branca Modelo Black', 109.90, 'img/CamisaModeloBlack.png')">
                Adicionar ao carrinho
            </button>
        </div>

        <div class="card">
            <img src="img/MoletomDarkBlue.png" alt="Moletom Dark Blue">
            <h3>Moletom Dark Blue</h3>
            <p>R$ 160,00</p>
            <button onclick="adicionarCarrinho('Moletom Dark Blue', 160.00, 'img/MoletomDarkBlue.png')">
                Adicionar ao carrinho
            </button>
        </div>

        <div class="card">
            <img src="img/BoneBlueMacaw.png" alt="Boné Azul">
            <h3>Boné Azul</h3>
            <p>R$ 50,00</p>
            <button onclick="adicionarCarrinho('Boné Azul', 50.00, 'img/BoneBlueMacaw.png')">
                Adicionar ao carrinho
            </button>
        </div>

        <div class="card">
            <img src="img/CamisetaMangaLonga.png" alt="Camiseta Manga Longa Preta">
            <h3>Camiseta de Manga Longa Preta</h3>
            <p>R$ 90,00</p>
            <button onclick="adicionarCarrinho('Camiseta de Manga Longa Preta', 90.00, 'img/CamisetaMangaLonga.png')">
                Adicionar ao carrinho
            </button>
        </div>

        <div class="card">
            <img src="img/TenisBlack.png" alt="Tênis Black">
            <h3>Tênis Black</h3>
            <p>R$ 250,00</p>
            <button onclick="adicionarCarrinho('Tênis Black', 250.00, 'img/TenisBlack.png')">
                Adicionar ao carrinho
            </button>
        </div>

        <div class="card">
            <img src="img/CamisaSocialBranca.png" alt="Camisa Social Branca">
            <h3>Camisa Social Branca</h3>
            <p>R$ 175,00</p>
            <button onclick="adicionarCarrinho('Camisa Social Branca', 175.00, 'img/CamisaSocialBranca.png')">
                Adicionar ao carrinho
            </button>

        </div>

    </section>

    <script>

        function adicionarCarrinho(nome, preco, imagem) {

            let carrinho =
                JSON.parse(localStorage.getItem("carrinho")) || [];

            carrinho.push({
                nome: nome,
                preco: preco,
                imagem: imagem
            });

            localStorage.setItem(
                "carrinho",
                JSON.stringify(carrinho)
            );

            alert(nome + " adicionado ao carrinho!");
        }

    </script>

</body>
</html>
